spring:
  application:
    name: user-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/webprotege
      database: webprotege
  cloud:
    loadbalancer:
      ribbon:
        enabled: true

server:
  port: 8081
  debug: true

# Eureka客户端配置
eureka:
  client:
    serviceUrl:
      defaultZone: http://admin:admin123@localhost:8762/eureka/
    # 启用健康检查
    healthcheck:
      enabled: true
    # 注册间隔
    registryFetchIntervalSeconds: 30
    # 心跳间隔
    leaseRenewalIntervalInSeconds: 30
    # 服务过期时间
    leaseExpirationDurationInSeconds: 90
  instance:
    preferIpAddress: true
    # 实例ID包含IP和端口
    instanceId: ${spring.cloud.client.ip-address}:${server.port}
    # 健康检查路径
    statusPageUrlPath: /actuator/health
    # 主页路径
    homePageUrlPath: /

# Ribbon重试配置
ribbon:
  # 连接超时时间
  ConnectTimeout: 3000
  # 读取超时时间
  ReadTimeout: 6000
  # 最大重试次数
  MaxAutoRetries: 1
  # 最大重试实例数
  MaxAutoRetriesNextServer: 2
  # 对所有操作进行重试
  OkToRetryOnAllOperations: true

# 断路器配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        # 滑动窗口大小
        slidingWindowSize: 100
        # 失败率阈值
        failureRateThreshold: 50
        # 等待时间
        waitDurationInOpenState: 60000
        # 半开状态允许的请求数
        permittedNumberOfCallsInHalfOpenState: 10
        # 自动重置时间
        automaticTransitionFromOpenToHalfOpenEnabled: true
