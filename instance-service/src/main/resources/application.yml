spring:
  application:
    name: instance-service
  main:
    sources: com.by.open.ontology.instanceservice.InstanceServiceApplication
  data:
    mongodb:
      uri: mongodb://localhost:27017/webprotege
      database: webprotege

server:
  port: 8085

eureka:
  client:
    serviceUrl:
      defaultZone: http://admin:admin123@localhost:8762/eureka/
  instance:
    preferIpAddress: true