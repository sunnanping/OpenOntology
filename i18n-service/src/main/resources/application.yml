server:
  port: 8086

spring:
  application:
    name: i18n-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/openontology
      auto-index-creation: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8762/eureka/
  instance:
    prefer-ip-address: true

cache:
  type: simple
  cache-names: translations

translation:
  google:
    api-key: ${GOOGLE_TRANSLATE_API_KEY:}
  deepl:
    api-key: ${DEEPL_API_KEY:}
  microsoft:
    api-key: ${MICROSOFT_TRANSLATE_API_KEY:}
  yandex:
    api-key: ${YANDEX_TRANSLATE_API_KEY:}
  baidu:
    app-id: ${BAIDU_TRANSLATE_APP_ID:}
    secret-key: ${BAIDU_TRANSLATE_SECRET_KEY:}
  aliyun:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
  youdao:
    app-id: ${YOUDAO_APP_ID:}
    app-secret: ${YOUDAO_APP_SECRET:}
  tencent:
    secret-id: ${TENCENT_SECRET_ID:}
    secret-key: ${TENCENT_SECRET_KEY:}
    region: ${TENCENT_REGION:ap-beijing}

logging:
  level:
    com.by.open.ontology.i18nservice: DEBUG
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
