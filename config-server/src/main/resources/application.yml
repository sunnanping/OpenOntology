spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/protegeproject/webprotege
          search-paths: config
          username: your-github-username
          password: your-github-token

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info

  endpoint:
    refresh:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://admin:admin123@localhost:8762/eureka/
  instance:
    preferIpAddress: true